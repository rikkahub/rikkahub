name: Build APK (Debug)

on:
  workflow_dispatch:
  push:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
      - run: |
          echo 'android.useAndroidX=true' > local.properties
          echo 'android.enableJetifier=false' >> local.properties
          echo '{"project_info":{"project_number":"0","project_id":"verify"},"client":[{"client_info":{"mobilesdk_app_id":"1:0:android:0000000000000000","android_client_info":{"package_name":"me.rerere.rikkahub.debug"}},"oauth_client":[],"api_key":[{"current_key":""}]}]}' > app/google-services.json
      - run: ./gradlew app:assembleDebug -x :web:buildWebUi
      - if: success()
        uses: actions/upload-artifact@v4
        with:
          name: rikkahub-debug-apk
          path: app/build/outputs/apk/debug/*.apk
