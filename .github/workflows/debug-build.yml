name: Debug APK Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Create placeholder google-services.json
        run: |
          cat > app/google-services.json << 'EOF'
          {
            "project_info": {
              "project_id": "placeholder",
              "project_number": "0",
              "name": "Placeholder"
            },
            "client": [
              {
                "oauth_client": [],
                "api_key": [{"current_key": "placeholder"}],
                "services": {"appinvite_service": {"other_platform_oauth_client": []}},
                "client_info": {
                  "mobilesdk_app_id": "1:0:android:placeholder",
                  "android_client_info": {"package_name": "me.rerere.rikkahub"}
                }
              },
              {
                "oauth_client": [],
                "api_key": [{"current_key": "placeholder"}],
                "services": {"appinvite_service": {"other_platform_oauth_client": []}},
                "client_info": {
                  "mobilesdk_app_id": "1:0:android:placeholder-debug",
                  "android_client_info": {"package_name": "me.rerere.rikkahub.debug"}
                }
              }
            ]
          }
          EOF

      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
