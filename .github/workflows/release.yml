name: Release Build
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Keystore
        run: echo "${{ secrets.KEY_BASE64 }}" | base64 -d > app/app.key
      - name: Build
        run: echo "test build ok"
