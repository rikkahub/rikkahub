name: Release Build
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Decode keystore
        env:
          KEY_B64: ${{ secrets.KEY_BASE64 }}
        run: echo "$KEY_B64" | base64 -d > app/app.key
      - name: Write signing config
        env:
          SIGNING: ${{ secrets.SIGNING_CONFIG }}
        run: echo "$SIGNING" > local.properties
      - name: Build
        run: echo "build ok"
