name: Release Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Gradle Build
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Rename APK files
        run: |
          cd app/build/outputs/apk/release
          for file in *.apk; do
            new_name="hffchat-$(echo $file | sed 's/rikkahub/hffchat/')"
            mv "$file" "$new_name"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: artifacts
          path: app/build/outputs/apk/release/*.apk

      - name: Create Release
        if: success()
        run: |
          VERSION=$(grep "versionName" app/build.gradle.kts | cut -d '"' -f 2)
          TAG="v$VERSION"
          
          # Create release
          gh release create "$TAG" \
            --title "Release $VERSION" \
            --body "HFFChat $VERSION"
          
          # Upload APKs to release
          gh release upload "$TAG" app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
