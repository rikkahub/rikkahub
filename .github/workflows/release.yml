name: Release Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('web-ui/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache web-ui node_modules
        uses: actions/cache@v4
        with:
          path: web-ui/node_modules
          key: ${{ runner.os }}-webui-node-modules-${{ hashFiles('web-ui/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-webui-node-modules-

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/configuration-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install zsh and pnpm
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq zsh
          npm install -g pnpm
          cd web-ui && pnpm install --frozen-lockfile

      - name: Prepare build files
        run: |
          echo "${{ secrets.KEY_BASE64 }}" | base64 -d > app/app.key
          echo "${{ secrets.SIGNING_CONFIG }}" > local.properties
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Gradle Build
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --parallel --configuration-cache

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: artifacts
          path: app/build/outputs/apk/release/*.apk

      - name: Publish Release
        uses: softprops/action-gh-release@v1
        if: success()
        with:
          tag_name: v2.4.1-procare
          name: v2.4.1-procare
          generate_release_notes: true
          files: app/build/outputs/apk/release/*.apk
