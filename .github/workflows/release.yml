name: Release Build
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web-ui/pnpm-lock.yaml
      - name: Install web-ui
        working-directory: web-ui
        run: pnpm install --frozen-lockfile
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-cache
      - name: Keystore
        run: echo "${{ secrets.KEY_BASE64 }}" | base64 -d > app/app.key
      - name: Signing config
        run: echo "${{ secrets.SIGNING_CONFIG }}" > local.properties
      - name: Google Services
        run: echo '{}' > app/google-services.json
      - name: Build APK
        run: ./gradlew assembleRelease
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.4.1-procare
          name: v2.4.1-procare
          generate_release_notes: true
          files: app/build/outputs/apk/release/*.apk
