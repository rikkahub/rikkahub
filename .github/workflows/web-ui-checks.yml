name: Web UI Checks

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-ui:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: web-ui
        run: bun install --frozen-lockfile

      - name: Format check
        working-directory: web-ui
        run: bun run fmt:check

      - name: Lint
        working-directory: web-ui
        run: ./node_modules/.bin/oxlint app

      - name: Typecheck
        working-directory: web-ui
        run: bun run typecheck

      - name: Test
        working-directory: web-ui
        run: bun run test:ci

      - name: Build
        working-directory: web-ui
        run: bun run build
