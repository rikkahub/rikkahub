name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Create placeholder google-services.json
        run: |
          cat > app/google-services.json << 'EOF'
          {
            "project_info": {
              "project_id": "placeholder",
              "project_number": "0",
              "name": "Placeholder"
            },
            "client": [
              {
                "oauth_client": [],
                "api_key": [{"current_key": "placeholder"}],
                "services": {"appinvite_service": {"other_platform_oauth_client": []}},
                "client_info": {
                  "mobilesdk_app_id": "1:0:android:placeholder",
                  "android_client_info": {"package_name": "me.rerere.rikkahub"}
                }
              },
              {
                "oauth_client": [],
                "api_key": [{"current_key": "placeholder"}],
                "services": {"appinvite_service": {"other_platform_oauth_client": []}},
                "client_info": {
                  "mobilesdk_app_id": "1:0:android:placeholder-debug",
                  "android_client_info": {"package_name": "me.rerere.rikkahub.debug"}
                }
              }
            ]
          }
          EOF

      - name: Run lint
        run: |
          chmod +x gradlew
          ./gradlew lintDebug --no-daemon

      - name: Run unit tests
        run: |
          ./gradlew testDebugUnitTest --no-daemon

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/build/reports/tests/**'
