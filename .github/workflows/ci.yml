name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Compile · Test · Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # material3 vendors material-color-utilities (provides the dynamiccolor package) as a submodule.
          submodules: recursive

      # Daemon JVM criteria pins JetBrains Runtime 21 (gradle/gradle-daemon-jvm.properties).
      - uses: actions/setup-java@v4
        with:
          distribution: jetbrains
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      # google-services.json is gitignored and required by the firebase/gms plugin.
      # CI uses a mock with the release + .debug applicationIds; values are non-functional.
      - name: Generate mock google-services.json
        run: |
          cat > app/google-services.json <<'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "rikkahub-mock",
              "storage_bucket": "rikkahub-mock.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                  "android_client_info": { "package_name": "me.rerere.rikkahub" }
                },
                "oauth_client": [],
                "api_key": [ { "current_key": "AIzaSyMock0000000000000000000000000000000" } ],
                "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
              },
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000000001",
                  "android_client_info": { "package_name": "me.rerere.rikkahub.debug" }
                },
                "oauth_client": [],
                "api_key": [ { "current_key": "AIzaSyMock0000000000000000000000000000000" } ],
                "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
              }
            ],
            "configuration_version": "1"
          }
          EOF

      # :web:buildWebUi shells out to pnpm to build the React frontend — orthogonal
      # to the Kotlin/Android gate and absent on the runner, so it is excluded.
      # The :app module carries a play/sideload product flavor (issue #197 §4.1 Option A), so the
      # unflavored variant tasks no longer exist. Compile BOTH flavors to prove both source sets +
      # the per-flavor sideloadWorkspaceTools seam resolve.
      - name: Compile (all modules, debug)
        run: ./gradlew compilePlayDebugKotlin compileSideloadDebugKotlin -x :web:buildWebUi --stacktrace

      # P1-P3 boundary gates for the neutral :ai-runtime contract module (issue #243 §E).
      # :ai-runtime hosts the Android-/app-neutral chat-turn runtime contract; it must stay neutral so
      # the runtime logic can be unit-tested without a device and reused without dragging in app types.
      #   P1  no app types / Android imports / Compose in ai-runtime/src.
      #         (Scoped to ai-runtime/src — :ai legitimately imports android.* (Context/Log/Bitmap),
      #          so the §E one-liner's `ai/src ai-runtime/src` scope cannot hold for :ai; the invariant
      #          this issue protects is that the NEW module stays neutral. :ai's Compose-freeness was
      #          secured separately by slice 1 / #248.)
      #   P2  ai-runtime depends ONLY on :ai and :common — never :app/:search/:document/:automation/:workspace.
      #   P3  no Room/Dao/Entity/AppDatabase/DataStore/SettingsStore/Context/R. persistence or platform refs.
      # rg is preinstalled on ubuntu-latest. Each gate fails the build with ::error:: on violation, and
      # P2 is fail-loud (errors if :ai stops appearing on the classpath) so it can never pass vacuously.
      - name: Assert :ai-runtime boundary (P1-P3)
        run: |
          set -euo pipefail

          # P1 — no app types, Android refs, or Compose in the neutral module.
          # The `android.` alternation is anchored to a token boundary ((^|[^A-Za-z0-9_.])) so it
          # catches BOTH `import android.…` AND bare fully-qualified refs (android.os.Build.VERSION,
          # android.util.Log.d) that carry no import statement — :ai-runtime is an Android library with
          # a compileSdk, so those FQ refs resolve on the classpath and would leak the platform in
          # without an import. The boundary excludes me.rerere…android-suffixed identifiers and the
          # com.android.* build namespace (preceded by `.`), which are not platform-API leaks.
          if rg -n 'me\.rerere\.rikkahub|(^|[^A-Za-z0-9_.])android\.|androidx\.compose|@Composable' ai-runtime/src; then
            echo "::error::P1 VIOLATION — app type / Android ref / Compose leaked into :ai-runtime (issue #243 §E). The runtime contract must stay neutral." >&2
            exit 1
          fi

          # P3 — no persistence or platform references.
          # Import/package-oriented to match the design's literal P3 invariant
          # (androidx.room / androidx.datastore / io.objectbox) without false-failing on neutral
          # identifiers. Bare `Context`/`Entity`/`Room`/`Dao` are dropped: they substring-match the
          # design's OWN next-slice runtime types — ToolAssemblyContext (contract block B, slice 6),
          # the neutral GenerationContext / RuntimeTransformerContext (slice 7) — and any class merely
          # containing those substrings (ChatMessageEntity, RoomCoordinator). The literal targets are
          # the persistence packages, which carry no identifier ambiguity. AppDatabase/SettingsStore are
          # kept but word-bounded; R. is anchored to a token boundary (mirrors P1 above) so a bare
          # `…R.` substring (e.g. `foR.bar`) cannot match, while real `R.string` resource refs do.
          # `androidx.datastore` is the lowercase package the old capital `DataStore` token never caught.
          if rg -n 'androidx\.room|androidx\.datastore|io\.objectbox|\bAppDatabase\b|\bSettingsStore\b|(^|[^A-Za-z0-9_.])R\.' ai-runtime/src; then
            echo "::error::P3 VIOLATION — persistence package / AppDatabase / SettingsStore / R resource reference leaked into :ai-runtime (issue #243 §E)." >&2
            exit 1
          fi

          # P2 — module-dependency ALLOW-list. ai-runtime may depend ONLY on :ai and :common.
          # This is an allow-list, not a ban-list: extract EVERY 'project :X' edge from the report and
          # fail if the set differs from exactly {:ai,:common}. A ban-list of named modules would
          # silently permit a new edge to :speech/:web/:material3/:highlight (several Compose-bearing) —
          # the invariant is closed only by enumerating what is allowed.
          deps=$(./gradlew :ai-runtime:dependencies --configuration releaseRuntimeClasspath -x :web:buildWebUi --stacktrace)
          # Distinct ':X' module tokens on the classpath (dedup the gradle `(*)` repeat markers).
          projects=$(echo "$deps" | grep -oE 'project :[A-Za-z0-9_-]+' | sed 's/^project //' | sort -u)
          # Fail loud if the expected :ai project dep is gone — layout drift would make the check below
          # pass against nothing.
          if ! echo "$projects" | grep -qxE ':ai'; then
            echo "::error::P2 guard found no 'project :ai' on :ai-runtime releaseRuntimeClasspath — module layout changed; refusing to pass vacuously." >&2
            exit 1
          fi
          unexpected=$(echo "$projects" | grep -vxE ':ai|:common' || true)
          if [ -n "$unexpected" ]; then
            echo "::error::P2 VIOLATION — :ai-runtime depends on a module outside the allow-list (issue #243 §E). Allowed deps are :ai and :common only; found:" >&2
            echo "$unexpected" >&2
            exit 1
          fi
          echo ":ai-runtime boundary OK: neutral (P1/P3) and deps within {:ai,:common} (P2)."

      # P-FLAVOR guard (issue #197 §3 I-FLAVOR / design note security-model-design:197 §4.1 Option A):
      # the LLM-driven shell/write factories (create{Write,Edit,Delete,Move,Shell}Tool) must be
      # PHYSICALLY ABSENT from the Play classpath, not merely runtime-suppressed — their bodies live in
      # app/src/sideload only. Compiling playDebug proves it BUILDS but not that the dangerous symbols
      # are gone; this step asserts absence by javap-scanning every compiled playDebug class for those
      # factory names. It fails CI if a later edit moves a factory into app/src/main (compiled into the
      # Play APK) or wires the empty `play` seam — which would ship arbitrary-write/code-exec into the
      # Play APK with an otherwise-green build. Fail-loud if the playDebug output layout moves (anchor
      # WorkspaceToolsGateKt.class missing) so the guard can never silently pass against nothing.
      - name: Assert Play flavor carries no shell/write factory (P-FLAVOR)
        run: |
          anchor=$(find app/build -path '*playDebug*' -name 'WorkspaceToolsGateKt.class' | head -1)
          if [ -z "$anchor" ]; then
            echo "::error::P-FLAVOR guard found no playDebug WorkspaceToolsGateKt.class — class output layout changed; refusing to pass vacuously." >&2
            exit 1
          fi
          # Slice 6b extends the alternation to the PTY terminal/session symbols: the terminal page,
          # the PRoot session factory, and the session/view clients live in app/src/sideload only, so
          # they must never appear in the Play classpath either (I-FLAVOR for the interactive shell UI).
          hits=$(find app/build -path '*playDebug*' -name '*.class' -print0 \
            | xargs -0 javap -p 2>/dev/null \
            | grep -E 'create(Write|Edit|Delete|Move|Shell)Tool|WorkspaceTerminalPage|WorkspaceTerminalSession|createWorkspaceTerminalSession|WorkspaceTerminalSessionClient|WorkspaceTerminalViewClient' || true)
          if [ -n "$hits" ]; then
            echo "::error::P-FLAVOR VIOLATION — a shell/write factory or terminal UI symbol leaked into the Play classpath (issue #197 §3 I-FLAVOR). These must stay in app/src/sideload only:" >&2
            echo "$hits" >&2
            exit 1
          fi
          echo "P-FLAVOR OK: no shell/write factory symbol in the Play classpath."

      # :app is flavored, so testDebugUnitTest no longer resolves to an :app variant — run the
      # sideload variant explicitly (feature-superset; covers WorkspaceToolsTest +
      # WorkspaceRepositoryShellEnableTest + the gated factories in app/src/sideload). The unflavored
      # testDebugUnitTest aggregate still schedules every library module's JVM tests (:ai, :automation,
      # :common, :document, :search, :speech, :web, :workspace) — it must stay or that coverage silently
      # stops running. Combining both is unambiguous (no :app flavor task matches testDebugUnitTest).
      - name: Unit tests
        run: ./gradlew testSideloadDebugUnitTest testDebugUnitTest -x :web:buildWebUi --stacktrace

      - name: Android Lint
        run: ./gradlew lintSideloadDebug -x :web:buildWebUi --stacktrace

      - name: Upload reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            **/build/reports/
            **/build/test-results/
          retention-days: 7
          if-no-files-found: ignore
