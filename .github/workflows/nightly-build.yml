name: Nightly Build (Debug)

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - uses: actions/checkout@v4
      - name: Check for recent commits
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "$(git log --since='24 hours ago' --oneline)" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web-ui/pnpm-lock.yaml

      - name: Install web-ui dependencies
        working-directory: web-ui
        run: pnpm install --frozen-lockfile

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Prepare build files
        run: |
          echo 'android.useAndroidX=true' > local.properties
          echo 'android.enableJetifier=false' >> local.properties
          echo '{"project_info":{"project_number":"0","project_id":"nightly"},"client":[{"client_info":{"mobilesdk_app_id":"1:0:android:0000000000000000","android_client_info":{"package_name":"me.rerere.rikkahub.debug"}},"oauth_client":[],"api_key":[{"current_key":""}]}]}' > app/google-services.json

      - name: Gradle Build
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Publish nightly prerelease
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: nightly
          name: Nightly Build
          prerelease: true
          body: |
            自动每日构建（commit `${{ github.sha }}`）

            > ⚠️ Debug 版本，仅供测试。
          files: app/build/outputs/apk/debug/*.apk
