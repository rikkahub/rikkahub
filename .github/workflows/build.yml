name: Build APK
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web-ui/pnpm-lock.yaml

      - name: Install web-ui
        working-directory: web-ui
        run: pnpm install --frozen-lockfile

      - uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore app.key \
            -alias rikkahub -keyalg RSA -keysize 2048 \
            -validity 10000 -storepass android123 -keypass android123 \
            -dname "CN=RikkaHub, OU=Procare, O=Pheobe-Southwood, L=Earth, ST=World, C=CN"
          mv app.key app/

      - name: Signing config
        run: |
          echo "storeFile=app.key" > local.properties
          echo "storePassword=android123" >> local.properties
          echo "keyAlias=rikkahub" >> local.properties
          echo "keyPassword=android123" >> local.properties

      - name: Google Services
        run: echo '{"project_info":{"project_number":"0","project_id":"rikkahub"},"client":[{"client_info":{"mobilesdk_app_id":"1:0:android:0","android_client_info":{"package_name":"me.rerere.rikkahub"}},"api_key":[{"current_key":"0"}]}]}' > app/google-services.json

      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.4.1-procare
          name: v2.4.1-procare
          files: app/build/outputs/apk/release/*.apk
