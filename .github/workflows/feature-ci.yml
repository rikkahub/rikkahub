name: Feature CI

on:
  push:
    branches:
      - feat/custom-chat-input-placeholder
  pull_request:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: feature-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    if: github.repository == 'c45v3/rikkahub'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web-ui/pnpm-lock.yaml

      - name: Install web UI dependencies
        working-directory: web-ui
        run: pnpm install --frozen-lockfile

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager 'platforms;android-37.0' 'platforms;android-36.1' 'build-tools;37.0.0'

      - name: Prepare debug Google Services configuration
        run: |
          cat > app/google-services.json <<'JSON'
          {
            "project_info": {
              "project_number": "123456789012",
              "project_id": "rikkahub-feature-ci",
              "storage_bucket": "rikkahub-feature-ci.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:123456789012:android:0123456789abcdef012345",
                  "android_client_info": {
                    "package_name": "me.rerere.rikkahub.debug"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "feature-ci-placeholder"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          JSON

      - name: Run focused placeholder tests
        run: |
          chmod +x gradlew
          ./gradlew :app:testDebugUnitTest \
            --tests me.rerere.rikkahub.data.model.AssistantInputPlaceholderTest \
            --stacktrace

      - name: Run app unit tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace
