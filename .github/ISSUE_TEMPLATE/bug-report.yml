name: Bug Report
description: 报告APP Bug或者崩溃
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你花时间提交 Bug 报告！请尽量填写完整信息以便我们复现和修复问题。
        Thanks for taking the time to report a bug! Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: 问题描述 | Problem Description
      description: 请详细描述你遇到的问题，包括复现步骤。 / Describe the issue in detail, including steps to reproduce.
      placeholder: |
        1. 进入 ...
        2. 点击 ...
        3. 出现了 ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为 | Expected Behavior
      description: 你期望应该发生什么？ / What did you expect to happen?
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: 截图 | Screenshots
      description: 如有相关截图或录屏，请粘贴到此处。 / Attach relevant screenshots or screen recordings here.
    validations:
      required: false

  - type: input
    id: app-version
    attributes:
      label: APP 版本 | App Version
      description: 例如 v1.2.3 / e.g. v1.2.3
      placeholder: v1.2.3
    validations:
      required: true

  - type: input
    id: android-version
    attributes:
      label: 安卓版本 | Android Version
      description: 例如 Android 14 / e.g. Android 14
      placeholder: Android 14
    validations:
      required: true

  - type: input
    id: device-model
    attributes:
      label: 手机型号 | Device Model
      description: 例如 小米 14 / e.g. Xiaomi 14
      placeholder: Xiaomi 14
    validations:
      required: true
