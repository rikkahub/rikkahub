// Provider / TTS / ASR settings: sealed classes with `var` fields (so the
// compiler infers them unstable), but they are only ever replaced via copy()/
// copyProvider() — never mutated in place — so the settings list rows can't skip
// even with key=. Force-stable so unchanged Provider/TTS/ASR rows skip on any
// settings.copy() (toggle, reorder, edit).
