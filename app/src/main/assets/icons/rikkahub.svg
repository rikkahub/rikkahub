<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="256" height="256">
    <defs>
        <filter id="lune-glow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="8" result="blur1" />
            <feGaussianBlur stdDeviation="15" result="blur2" />
            <feMerge>
                <feMergeNode in="blur2" />
                <feMergeNode in="blur1" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <linearGradient id="lune-blue-grad-1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00f2fe" />
            <stop offset="100%" stop-color="#4facfe" />
        </linearGradient>
        <linearGradient id="lune-blue-grad-2" x1="100%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#0052D4" />
            <stop offset="50%" stop-color="#4364F7" />
            <stop offset="100%" stop-color="#6FB1FC" />
        </linearGradient>
        <linearGradient id="lune-blue-grad-3" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#00C9FF" />
            <stop offset="100%" stop-color="#192846" />
        </linearGradient>
    </defs>
    <rect x="60" y="60" width="1080" height="1080" rx="260" fill="#ffffff" stroke="#d9e8ff" stroke-width="24" />
    <g transform="translate(100 100)">
        <g fill="none" stroke-linecap="round" filter="url(#lune-glow)">
            <circle cx="500" cy="500" r="4" fill="#00f2fe" opacity="0.6" />
            <circle cx="500" cy="500" r="90" stroke="url(#lune-blue-grad-1)" stroke-width="7" stroke-dasharray="200 80 180 105" transform="rotate(45 500 500)" />
            <circle cx="500" cy="500" r="170" stroke="url(#lune-blue-grad-2)" stroke-width="9" stroke-dasharray="350 150 400 168" transform="rotate(135 500 500)" />
            <circle cx="500" cy="500" r="260" stroke="url(#lune-blue-grad-3)" stroke-width="6" stroke-dasharray="500 200 450 150 200 133" transform="rotate(-60 500 500)" />
            <circle cx="500" cy="500" r="360" stroke="url(#lune-blue-grad-1)" stroke-width="11" stroke-dasharray="850 300 650 200 150 111" transform="rotate(20 500 500)" opacity="0.9" />
            <circle cx="500" cy="500" r="460" stroke="url(#lune-blue-grad-2)" stroke-width="5" stroke-dasharray="1100 400 800 350 150 90" transform="rotate(-110 500 500)" opacity="0.75" />
            <g stroke="#4facfe" stroke-width="1" opacity="0.15">
                <circle cx="500" cy="500" r="90" />
                <circle cx="500" cy="500" r="170" />
                <circle cx="500" cy="500" r="260" />
                <circle cx="500" cy="500" r="360" />
                <circle cx="500" cy="500" r="460" />
            </g>
        </g>
    </g>
</svg>
